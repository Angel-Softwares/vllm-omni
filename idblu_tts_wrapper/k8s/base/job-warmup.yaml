apiVersion: batch/v1
kind: Job
metadata:
  name: idblu-tts-warmup
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: idblu-tts-warmup
    spec:
      serviceAccountName: idblu-eks-tts-runtime
      restartPolicy: OnFailure
      containers:
        - name: warmup
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              cat <<'PY' >/tmp/warmup.py
              import json
              import os
              import time
              import urllib.error
              import urllib.request
              from pathlib import Path

              BASE_URL = "http://idblu-tts"
              MAX_WAIT_SECONDS = 1800
              SECRET_FILE = Path("/mnt/secrets-store/IDBLU_TTS_ADMIN_KEY")

              def request_json(url, headers=None, timeout=10.0):
                  req = urllib.request.Request(url, headers=headers or {})
                  with urllib.request.urlopen(req, timeout=timeout) as response:
                      raw = response.read().decode("utf-8")
                      return json.loads(raw) if raw else {}

              def wait_for_ready():
                  deadline = time.monotonic() + MAX_WAIT_SECONDS
                  last_error = ""
                  while time.monotonic() < deadline:
                      try:
                          request_json(f"{BASE_URL}/health", timeout=5.0)
                          ready = request_json(f"{BASE_URL}/ready", timeout=10.0)
                          if ready.get("status") == "ready":
                              return
                      except Exception as exc:
                          last_error = repr(exc)
                      time.sleep(5)
                  raise RuntimeError(f"Warmup target not ready in {MAX_WAIT_SECONDS}s: {last_error}")

              def main():
                  wait_for_ready()
                  admin_key = SECRET_FILE.read_text().strip()
                  voice_id = os.environ.get("IDBLU_TTS_DEFAULT_VOICE_ID", "").strip()
                  if not voice_id:
                      payload = request_json(
                          f"{BASE_URL}/v1/audio/voices",
                          headers={"x-admin-key": admin_key},
                          timeout=15.0,
                      )
                      voices = payload.get("data") or []
                      voice_id = voices[0]["voice_id"] if voices else ""
                  if not voice_id:
                      print("No voice available for warmup; skipping")
                      return

                  body = {
                      "model": os.environ["IDBLU_TTS_MODEL_ID"],
                      "input": os.environ.get("IDBLU_TTS_WARMUP_TEXT", "Bonjour, ceci est un court test de demarrage."),
                      "voice_id": voice_id,
                      "task_type": os.environ.get("IDBLU_TTS_TASK_TYPE", "Base"),
                      "language": "Auto",
                      "stream": True,
                      "response_format": os.environ.get("IDBLU_TTS_RESPONSE_FORMAT", "pcm"),
                  }
                  req = urllib.request.Request(
                      f"{BASE_URL}/v1/audio/speech",
                      data=json.dumps(body).encode("utf-8"),
                      headers={"content-type": "application/json", "x-admin-key": admin_key},
                      method="POST",
                  )
                  total = 0
                  with urllib.request.urlopen(req, timeout=MAX_WAIT_SECONDS) as response:
                      while True:
                          chunk = response.read(4096)
                          if not chunk:
                              break
                          total += len(chunk)
                          if total >= 49152:
                              break
                  print(f"Warmup completed with bytes_read={total}")

              if __name__ == "__main__":
                  main()
              PY
              python /tmp/warmup.py
          envFrom:
            - configMapRef:
                name: idblu-tts-config
          volumeMounts:
            - name: secrets-store-inline
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: idblu-tts-secrets
