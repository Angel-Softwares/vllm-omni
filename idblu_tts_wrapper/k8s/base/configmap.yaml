apiVersion: v1
kind: ConfigMap
metadata:
  name: idblu-tts-config
data:
  HF_HOME: /cache/huggingface
  HF_HUB_CACHE: /cache/huggingface/hub
  IDBLU_TTS_MODEL_ID: Qwen/Qwen3-TTS-12Hz-1.7B-Base
  IDBLU_TTS_DEFAULT_VOICE_ID: eliane
  IDBLU_TTS_VOICE_CACHE_DIR: /data/voices
  IDBLU_TTS_VOICE_BUCKET: voice-agent-audio-registry
  IDBLU_TTS_VOICE_PREFIX: tts/staging/voices
  IDBLU_TTS_UPSTREAM_URL: http://127.0.0.1:8091
  IDBLU_TTS_TASK_TYPE: Base
  IDBLU_TTS_RESPONSE_FORMAT: pcm
  IDBLU_TTS_PUBLIC_HEALTH: "true"
  IDBLU_TTS_WARMUP_TEXT: Bonjour, ceci est un court test de demarrage.
  VLLM_OMNI_HOST: 127.0.0.1
  VLLM_OMNI_PORT: "8091"
  IDBLU_TTS_PORT: "8080"
  #VLLM_GLOBAL_GPU_MEMORY_UTILIZATION: "0.9"
  QWEN3_TTS_DEPLOY_CONFIG: vllm_omni/deploy/qwen3_tts_smooth.yaml
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
