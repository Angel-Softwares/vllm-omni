apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - configmap.yaml
  - deployment.yaml
  - ingress.yaml
  - cronjob-voice-sync.yaml
  - poddisruptionbudget.yaml
  - pv-model-cache-efs.yaml
  - pvc-model-cache.yaml
  - storageclass-voice-efs.yaml
  - service.yaml
  - pvc-voice-cache.yaml
  - serviceaccount.yaml
  - secretproviderclass.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: idblu-tts
      app.kubernetes.io/component: speech-api
      app.kubernetes.io/part-of: vllm-omni
