name: Deploy ID-BLU TTS

on:
  push:
    branches:
      - idblu-tts-*
  workflow_dispatch:
    inputs:
      target_environment:
        description: Deployment environment
        required: true
        type: choice
        options:
          - staging
          - release
          - production
      image_tag:
        description: Existing ECR image tag to deploy
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: ca-central-1
  AWS_ACCOUNT_ID: "449678530532"
  ECR_REPOSITORY: idblu-tts
  EKS_CLUSTER_NAME: idblu-eks-shared
  DOCKERFILE_PATH: docker/Dockerfile.idblu_tts
  K8S_ROOT: idblu_tts_wrapper/k8s

jobs:
  resolve:
    name: Resolve deployment target
    runs-on: ubuntu-latest
    outputs:
      target_env: ${{ steps.target.outputs.target_env }}
      namespace: ${{ steps.target.outputs.namespace }}
      overlay: ${{ steps.target.outputs.overlay }}

    steps:
      - name: Resolve target environment
        id: target
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET_ENV="${{ github.event.inputs.target_environment }}"
          else
            TARGET_ENV="staging"
          fi

          case "$TARGET_ENV" in
            staging|release|production) ;;
            *)
              echo "Unsupported target environment: $TARGET_ENV"
              exit 1
              ;;
          esac

          echo "target_env=$TARGET_ENV" >> "$GITHUB_OUTPUT"
          echo "namespace=idblu-tts-$TARGET_ENV" >> "$GITHUB_OUTPUT"
          echo "overlay=${K8S_ROOT}/$TARGET_ENV" >> "$GITHUB_OUTPUT"

  build:
    name: Build and push idblu_tts image
    runs-on: ubuntu-latest
    needs: resolve
    if: github.event_name == 'push'
    outputs:
      version: ${{ steps.tag.outputs.version }}
      image_sha: ${{ steps.tag.outputs.image_sha }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: tag
        shell: bash
        run: |
          SHA=$(git rev-parse --short HEAD)
          VERSION="0.1.0-${SHA}"
          ECR_REG="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_SHA="${ECR_REG}/${ECR_REPOSITORY}:${VERSION}"
          IMAGE_ENV="${ECR_REG}/${ECR_REPOSITORY}:${{ needs.resolve.outputs.target_env }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "image_sha=${IMAGE_SHA}" >> $GITHUB_OUTPUT
          echo "image_env=${IMAGE_ENV}" >> $GITHUB_OUTPUT
          echo "ecr_reg=${ECR_REG}" >> $GITHUB_OUTPUT

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.tag.outputs.image_sha }}
            ${{ steps.tag.outputs.image_env }}
          build-args: |
            FORK_COMMIT=${{ github.sha }}
            WRAPPER_VERSION=${{ steps.tag.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy idblu_tts
    runs-on: ubuntu-latest
    needs:
      - resolve
      - build
    if: ${{ always() && needs.resolve.result == 'success' && (github.event_name != 'push' || needs.build.result == 'success') }}
    environment: ${{ needs.resolve.outputs.target_env }}
    concurrency:
      group: idblu-tts-${{ needs.resolve.outputs.target_env }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve image to deploy
        id: image
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DEPLOY_TAG="${{ github.event.inputs.image_tag }}"
          else
            DEPLOY_TAG="${{ needs.build.outputs.version }}"
          fi

          if [ -z "$DEPLOY_TAG" ]; then
            echo "Deploy tag is empty"
            exit 1
          fi

          IMAGE_REF="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${DEPLOY_TAG}"
          echo "deploy_tag=$DEPLOY_TAG" >> "$GITHUB_OUTPUT"
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        shell: bash
        run: |
          aws eks update-kubeconfig \
            --name "${EKS_CLUSTER_NAME}" \
            --region "${AWS_REGION}"

      - name: Reset warmup job
        shell: bash
        run: |
          if kubectl get namespace "${{ needs.resolve.outputs.namespace }}" >/dev/null 2>&1; then
            kubectl -n "${{ needs.resolve.outputs.namespace }}" delete job idblu-tts-warmup --ignore-not-found
          fi

      - name: Deploy overlay
        shell: bash
        run: |
          kubectl kustomize "${{ needs.resolve.outputs.overlay }}" \
            | sed -E "s|image: .*/${ECR_REPOSITORY}:[^[:space:]]+|image: ${{ steps.image.outputs.image_ref }}|g" \
            | kubectl apply -f -

      - name: Wait for rollout
        shell: bash
        run: |
          kubectl -n "${{ needs.resolve.outputs.namespace }}" rollout status deployment/idblu-tts --timeout=30m

      - name: Show deployed pods
        shell: bash
        run: |
          kubectl -n "${{ needs.resolve.outputs.namespace }}" get pods -l app.kubernetes.io/name=idblu-tts -o wide
          kubectl -n "${{ needs.resolve.outputs.namespace }}" get deployment idblu-tts -o jsonpath='{.spec.template.spec.containers[0].image}'; echo

      - name: Wait for warmup job
        shell: bash
        run: |
          kubectl -n "${{ needs.resolve.outputs.namespace }}" wait --for=condition=complete job/idblu-tts-warmup --timeout=30m
