apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: idblu-tts-private
  annotations:
    external-dns.alpha.kubernetes.io/hostname: idblu-tts.idblu.internal
spec:
  rules:
    - host: idblu-tts.idblu.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: idblu-tts
                port:
                  number: 80
