apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: idblu-tts-secrets
spec:
  provider: aws
  secretObjects:
    - secretName: idblu-tts-secrets
      type: Opaque
      data:
        - objectName: IDBLU_TTS_ADMIN_KEY
          key: IDBLU_TTS_ADMIN_KEY
        - objectName: HF_TOKEN
          key: HF_TOKEN
  parameters:
    region: ca-central-1
    objects: |
      - objectName: "__SECRETS_MANAGER_SECRET_ID__"
        objectType: "secretsmanager"
        jmesPath:
          - path: "IDBLU_TTS_ADMIN_KEY"
            objectAlias: "IDBLU_TTS_ADMIN_KEY"
          - path: "HF_TOKEN"
            objectAlias: "HF_TOKEN"
