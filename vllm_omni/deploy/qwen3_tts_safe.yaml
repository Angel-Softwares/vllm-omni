# Qwen3-TTS deploy: conservative fallback for non-H100 / debugging setups.
#
# This variant is based on the bundled qwen3_tts.yaml, but disables the
# async-chunk pipeline and forces eager execution on both stages to avoid the
# more aggressive compile/cudagraph paths used by the default config.
#
# The repo's Qwen3-TTS offline tests use the same broad shape when they need a
# safer config path for lower-tier GPUs.
async_chunk: false
dtype: float16

connectors:
  connector_of_shared_memory:
    name: SharedMemoryConnector
    extra:
      shm_threshold_bytes: 65536
      codec_streaming: true
      connector_get_sleep_s: 0.01
      connector_get_max_wait_first_chunk: 3000
      connector_get_max_wait: 300
      codec_chunk_frames: 25
      codec_left_context_frames: 72

stages:
  - stage_id: 0
    max_num_seqs: 1
    gpu_memory_utilization: 0.2
    enforce_eager: true
    async_scheduling: false
    max_num_batched_tokens: 512
    max_model_len: 4096
    devices: "0"
    output_connectors:
      to_stage_1: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.9
      top_k: 50
      max_tokens: 4096
      seed: 42
      repetition_penalty: 1.05
    subtalker_sampling_params:
      do_sample: true
      temperature: 0.9
      top_k: 50
      top_p: 1.0

  - stage_id: 1
    max_num_seqs: 1
    gpu_memory_utilization: 0.2
    enforce_eager: true
    async_scheduling: false
    max_num_batched_tokens: 65536
    max_model_len: 65536
    devices: "0"
    input_connectors:
      from_stage_0: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 65536
      seed: 42
      repetition_penalty: 1.0

platforms:
  npu:
    stages:
      - stage_id: 0
        max_num_seqs: 1
        enforce_eager: true
        async_scheduling: false
      - stage_id: 1
        gpu_memory_utilization: 0.2
        async_scheduling: false
