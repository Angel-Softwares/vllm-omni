apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - configmap.yaml
  - deployment.yaml
  - deployment-ready-responses.yaml
  - ingress.yaml
  - ingress-ready-responses.yaml
  - cronjob-voice-sync.yaml
  - poddisruptionbudget.yaml
  - storageclass-voice-efs.yaml
  - service.yaml
  - service-ready-responses.yaml
  - pvc-voice-cache.yaml
  - serviceaccount.yaml
  - secretproviderclass.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/component: speech-api
      app.kubernetes.io/part-of: vllm-omni
