name: Deploy ID-BLU TTS

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: ca-central-1
  AWS_ACCOUNT_ID: "449678530532"
  ECR_REPOSITORY: idblu-tts
  ASG_NAME: idblu-tts-shared-tts-asg-shared
  DOCKERFILE_PATH: docker/Dockerfile.idblu_tts

jobs:
  build_push:
    name: Build and push idblu_tts
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
      image: ${{ steps.tag.outputs.image }}
      ecr_reg: ${{ steps.tag.outputs.ecr_reg }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.IDBLU_TTS_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: tag
        run: |
          SHA=$(git rev-parse --short HEAD)
          VERSION="0.1.0-${SHA}"
          ECR_REG="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE="${ECR_REG}/${ECR_REPOSITORY}:${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "ecr_reg=${ECR_REG}" >> $GITHUB_OUTPUT

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tag.outputs.image }}
          build-args: |
            FORK_COMMIT=${{ github.sha }}
            WRAPPER_VERSION=${{ steps.tag.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag image as latest
        if: github.event_name == 'workflow_dispatch'
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.tag.outputs.ecr_reg }}/${{ env.ECR_REPOSITORY }}:latest" \
            "${{ steps.tag.outputs.image }}"

  deploy:
    name: Deploy idblu_tts
    if: github.event_name == 'workflow_dispatch'
    needs: build_push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.IDBLU_TTS_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update running containers via SSM
        run: |
          VERSION="${{ needs.build_push.outputs.version }}"
          IMAGE="${{ needs.build_push.outputs.image }}"
          ECR_REG="${{ needs.build_push.outputs.ecr_reg }}"

          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ASG_NAME" \
            --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId" \
            --output text)

          if [ -z "$INSTANCE_IDS" ] || [ "$INSTANCE_IDS" = "None" ]; then
            echo "Could not find in-service instances for ASG $ASG_NAME"
            exit 1
          fi

          read -r -d '' REMOTE_SCRIPT <<EOF || true
          set -euo pipefail

          AWS_REGION="${AWS_REGION}"
          ECR_REG="${ECR_REG}"
          ECR_REPOSITORY="${ECR_REPOSITORY}"
          IMAGE="${IMAGE}"

          CONTAINER_NAME=$(docker ps -a --format '{{.Names}} {{.Image}}' | awk '$2 ~ /\/'"${ECR_REPOSITORY}"':/ { print $1; exit }')
          if [ -z "$CONTAINER_NAME" ]; then
            CONTAINER_NAME="${ECR_REPOSITORY}"
          fi

          if ! docker inspect "$CONTAINER_NAME" >/dev/null 2>&1; then
            echo "Could not find running container for repository ${ECR_REPOSITORY}"
            exit 1
          fi

          mapfile -t ENV_VARS < <(docker inspect "$CONTAINER_NAME" --format '{{range .Config.Env}}{{println .}}{{end}}')
          mapfile -t BINDS < <(docker inspect "$CONTAINER_NAME" --format '{{range .HostConfig.Binds}}{{println .}}{{end}}')
          mapfile -t PORTS < <(docker inspect "$CONTAINER_NAME" --format '{{range $p, $conf := .HostConfig.PortBindings}}{{range $conf}}{{printf "%s:%s\n" .HostPort $p}}{{end}}{{end}}')
          mapfile -t ENTRYPOINT_ARGS < <(docker inspect "$CONTAINER_NAME" --format '{{range .Config.Entrypoint}}{{println .}}{{end}}')
          mapfile -t CMD_ARGS < <(docker inspect "$CONTAINER_NAME" --format '{{range .Config.Cmd}}{{println .}}{{end}}')
          RESTART_POLICY=$(docker inspect "$CONTAINER_NAME" --format '{{.HostConfig.RestartPolicy.Name}}')
          NETWORK_MODE=$(docker inspect "$CONTAINER_NAME" --format '{{.HostConfig.NetworkMode}}')
          SHM_SIZE=$(docker inspect "$CONTAINER_NAME" --format '{{.HostConfig.ShmSize}}')
          RUNTIME=$(docker inspect "$CONTAINER_NAME" --format '{{.HostConfig.Runtime}}')
          DEVICE_REQUESTS=$(docker inspect "$CONTAINER_NAME" --format '{{json .HostConfig.DeviceRequests}}')

          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REG"
          docker pull "$IMAGE"
          docker rm -f "$CONTAINER_NAME" || true

          RUN_CMD=(docker run -d --name "$CONTAINER_NAME")

          if [ -n "$RESTART_POLICY" ] && [ "$RESTART_POLICY" != "no" ]; then
            RUN_CMD+=(--restart "$RESTART_POLICY")
          fi

          if [ -n "$NETWORK_MODE" ] && [ "$NETWORK_MODE" != "default" ]; then
            RUN_CMD+=(--network "$NETWORK_MODE")
          fi

          if [ "$SHM_SIZE" != "0" ]; then
            RUN_CMD+=(--shm-size "$SHM_SIZE")
          fi

          if [ "$RUNTIME" = "nvidia" ] || echo "$DEVICE_REQUESTS" | grep -q '"gpu"'; then
            RUN_CMD+=(--gpus all)
          fi

          for env_var in "${ENV_VARS[@]}"; do
            RUN_CMD+=(-e "$env_var")
          done

          for bind in "${BINDS[@]}"; do
            RUN_CMD+=(-v "$bind")
          done

          for port in "${PORTS[@]}"; do
            RUN_CMD+=(-p "$port")
          done

          RUN_CMD+=("$IMAGE")

          if [ "${#ENTRYPOINT_ARGS[@]}" -gt 0 ]; then
            RUN_CMD+=("${ENTRYPOINT_ARGS[@]}")
          fi

          if [ "${#CMD_ARGS[@]}" -gt 0 ]; then
            RUN_CMD+=("${CMD_ARGS[@]}")
          fi

          "${RUN_CMD[@]}"

          HEALTH_PORT=$(docker inspect "$CONTAINER_NAME" --format '{{with index .HostConfig.PortBindings "8080/tcp"}}{{(index . 0).HostPort}}{{end}}')
          if [ -z "$HEALTH_PORT" ]; then
            HEALTH_PORT=8080
          fi

          for i in $(seq 1 18); do
            CODE=$(curl -sf --max-time 10 -o /dev/null -w "%{http_code}" "http://127.0.0.1:${HEALTH_PORT}/health" 2>/dev/null || echo "000")
            echo "[$i/18] HTTP $CODE"
            if [ "$CODE" = "200" ]; then
              exit 0
            fi
            sleep 10
          done

          echo "Local health check failed for ${CONTAINER_NAME}"
          exit 1
          EOF

          PARAMETERS=$(jq -n --arg commands "$REMOTE_SCRIPT" '{commands: [$commands]}')
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids $INSTANCE_IDS \
            --comment "Deploy idblu_tts ${VERSION}" \
            --parameters "$PARAMETERS" \
            --query "Command.CommandId" \
            --output text)

          for INSTANCE_ID in $INSTANCE_IDS; do
            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID"

            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text)

            if [ "$STATUS" != "Success" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" \
                --output json
              exit 1
            fi
          done
