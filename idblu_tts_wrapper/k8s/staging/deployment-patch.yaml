apiVersion: apps/v1
kind: Deployment
metadata:
  name: idblu-tts
spec:
  replicas: 1
  strategy:
    type: Recreate
    rollingUpdate: null
  template:
    metadata:
      labels:
        app.kubernetes.io/environment: staging
    spec:
      nodeSelector:
        eks.amazonaws.com/nodegroup: idblu-eks-shared-gpu
      containers:
        - name: idblu-tts
          image: 449678530532.dkr.ecr.ca-central-1.amazonaws.com/idblu-tts:staging
