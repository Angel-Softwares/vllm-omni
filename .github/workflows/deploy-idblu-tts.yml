name: Deploy ID-BLU TTS

on:
  push:
    branches:
      - idblu-tts-*
  workflow_dispatch:
    inputs:
      target_environment:
        description: Deployment environment
        required: true
        type: choice
        options:
          - staging
          - release
          - production

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: ca-central-1
  AWS_ACCOUNT_ID: "449678530532"
  ECR_REPOSITORY: idblu-tts
  EKS_CLUSTER_NAME: idblu-eks-shared
  DOCKERFILE_PATH: docker/Dockerfile.idblu_tts
  K8S_ROOT: idblu_tts_wrapper/k8s

jobs:
  deploy:
    name: Build, push & deploy idblu_tts
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment || 'staging' }}
    concurrency:
      group: idblu-tts-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment || 'staging' }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6

      - name: Resolve target environment
        id: target
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET_ENV="${{ github.event.inputs.target_environment }}"
          else
            TARGET_ENV="staging"
          fi

          case "$TARGET_ENV" in
            staging|release|production) ;;
            *)
              echo "Unsupported target environment: $TARGET_ENV"
              exit 1
              ;;
          esac

          echo "target_env=$TARGET_ENV" >> "$GITHUB_OUTPUT"
          echo "namespace=idblu-tts-$TARGET_ENV" >> "$GITHUB_OUTPUT"
          echo "overlay=${K8S_ROOT}/$TARGET_ENV" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: tag
        shell: bash
        run: |
          SHA=$(git rev-parse --short HEAD)
          VERSION="0.1.0-${SHA}"
          ECR_REG="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_SHA="${ECR_REG}/${ECR_REPOSITORY}:${VERSION}"
          IMAGE_ENV="${ECR_REG}/${ECR_REPOSITORY}:${{ steps.target.outputs.target_env }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "image_sha=${IMAGE_SHA}" >> $GITHUB_OUTPUT
          echo "image_env=${IMAGE_ENV}" >> $GITHUB_OUTPUT
          echo "ecr_reg=${ECR_REG}" >> $GITHUB_OUTPUT

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.tag.outputs.image_sha }}
            ${{ steps.tag.outputs.image_env }}
          build-args: |
            FORK_COMMIT=${{ github.sha }}
            WRAPPER_VERSION=${{ steps.tag.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        shell: bash
        run: |
          aws eks update-kubeconfig \
            --name "${EKS_CLUSTER_NAME}" \
            --region "${AWS_REGION}"

      - name: Reset warmup job
        shell: bash
        run: |
          if kubectl get namespace "${{ steps.target.outputs.namespace }}" >/dev/null 2>&1; then
            kubectl -n "${{ steps.target.outputs.namespace }}" delete job idblu-tts-warmup --ignore-not-found
          fi

      - name: Deploy overlay
        shell: bash
        run: |
          kubectl apply -k "${{ steps.target.outputs.overlay }}"

      - name: Wait for rollout
        shell: bash
        run: |
          kubectl -n "${{ steps.target.outputs.namespace }}" rollout status deployment/idblu-tts --timeout=30m

      - name: Show deployed pods
        shell: bash
        run: |
          kubectl -n "${{ steps.target.outputs.namespace }}" get pods -l app.kubernetes.io/name=idblu-tts -o wide

      - name: Wait for warmup job
        shell: bash
        run: |
          kubectl -n "${{ steps.target.outputs.namespace }}" wait --for=condition=complete job/idblu-tts-warmup --timeout=30m
